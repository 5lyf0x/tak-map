# HTTPS reverse proxy for the TAK Map webpage.
# Exposes the dashboard on https://<server-ip>:9444/ and proxies to the
# private localhost dashboard backend on 127.0.0.1:8092.

server {
    # Listen on every local interface so LAN, ZeroTier, HaLow, and other
    # assigned IP addresses can all reach the same HTTPS dashboard.
    listen 0.0.0.0:9444 ssl;
    listen [::]:9444 ssl;
    server_name _;

    # Avoid nginx proxy header hash warnings on systems with many proxy headers.
    proxy_headers_hash_max_size 4096;
    proxy_headers_hash_bucket_size 256;

    # Do not require TAK/OpenTAKServer client certificates for the dashboard.
    ssl_verify_client off;

    ssl_certificate /etc/tak-server-dash/certs/tak-server-dash.crt;
    ssl_certificate_key /etc/tak-server-dash/certs/tak-server-dash.key;

    client_max_body_size 400M;
    proxy_read_timeout 600;
    proxy_send_timeout 600;

    location / {
        proxy_pass http://127.0.0.1:8092/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
